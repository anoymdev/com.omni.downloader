name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v, e.g. v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase Configuration
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Restore Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-signing/release.jks
        run: |
          : "${ANDROID_KEYSTORE_BASE64:?ANDROID_KEYSTORE_BASE64 secret is required}"
          mkdir -p "$(dirname "$ANDROID_KEYSTORE_PATH")"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build APK Release
        env:
          GRADLE_OPTS: "-Dorg.gradle.vfs.watch=false"
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-signing/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --target-platform android-arm64,android-x64

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk OmniDownloader.apk

      - name: Verify APK signature
        run: |
          APKSIGNER="$(command -v apksigner || true)"
          if [ -z "$APKSIGNER" ] && [ -n "${ANDROID_HOME:-}" ]; then
            APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          fi
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose --print-certs OmniDownloader.apk
          else
            echo "apksigner not found; skipping APK signature verification."
          fi

      - name: VirusTotal Scan (Large File)
        id: vt
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          # 1. Request special upload URL for files >32MB
          UPLOAD_URL=$(curl -s --request GET \
            --url https://www.virustotal.com/api/v3/files/upload_url \
            --header "x-apikey: $VT_API_KEY" | jq -r '.data')
            
          # 2. Upload the APK to the obtained URL
          echo "Uploading APK to VirusTotal..."
          curl -s --request POST \
            --url "$UPLOAD_URL" \
            --header "x-apikey: $VT_API_KEY" \
            --form "file=@OmniDownloader.apk" > /dev/null
            
          # 3. Calculate SHA256 hash for the report link
          FILE_HASH=$(sha256sum OmniDownloader.apk | awk '{print $1}')
          echo "url=https://www.virustotal.com/gui/file/$FILE_HASH" >> $GITHUB_OUTPUT

      - name: Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NOTES="Automated release from Omni Downloader.
          
          🛡️ **VirusTotal Scan:** [View Results](${{ steps.vt.outputs.url }})"
          
          gh release edit ${{ github.ref_name }} --notes "$RELEASE_NOTES" || \
          gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes "$RELEASE_NOTES"
          
          gh release upload ${{ github.ref_name }} OmniDownloader.apk --clobber
